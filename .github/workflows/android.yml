name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Inject Debug Keystore
      run: |
        mkdir -p /home/runner/.android
        echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > /home/runner/.android/debug.keystore
        ls -la /home/runner/.android/debug.keystore
        keytool -list -keystore /home/runner/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -v | grep SHA1
        echo "Keystore injected successfully"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "Release v${{ github.run_number }}"
        body: "Auto-generated release from commit ${{ github.sha }}"
        files: app/build/outputs/apk/debug/app-debug.apk
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
