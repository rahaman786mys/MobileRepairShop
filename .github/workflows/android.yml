name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Inject Debug Keystore
      run: |
        echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > app/debug.keystore
        ls -la app/debug.keystore
        echo "=== Keystore SHA-1 ==="
        keytool -list -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -v | grep SHA1

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Check gradlew line endings
      run: file gradlew

    - name: Build with Gradle
      run: ./gradlew clean assembleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
      shell: bash

    - name: Verify APK Exists
      run: ls -la app/build/outputs/apk/release/

    - name: Verify APK Signature
      run: |
        echo "=== Built APK SHA-1 ==="
        $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs app/build/outputs/apk/release/*.apk || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-MuZZu-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.4.2-build-${{ github.run_number }}
        name: "MuZZu Tech Professional v1.4.2 (Build ${{ github.run_number }})"
        body: "Optimized release for all devices (Low-end to High-end). Added 16 KB page-size compatibility and code shrinking."
        files: app/build/outputs/apk/release/*.apk
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
